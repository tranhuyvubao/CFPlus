<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CafePlus | VNPAY Return</title>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <style>
    :root {
      --bg: #f6efe5;
      --card: #fffaf3;
      --text: #36261b;
      --muted: #7b6454;
      --primary: #8b5b34;
      --primary-dark: #5b3417;
      --line: rgba(139, 91, 52, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255, 222, 164, 0.35), transparent 32%),
        var(--bg);
      color: var(--text);
    }

    .card {
      width: min(100%, 520px);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: 0 20px 48px rgba(91, 52, 23, 0.12);
      padding: 28px;
    }

    .eyebrow {
      margin: 0 0 8px;
      font-size: 13px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 32px;
      line-height: 1.15;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .status {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 18px;
      background: #fff;
      border: 1px solid var(--line);
      color: var(--primary-dark);
      font-weight: 600;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 24px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 54px;
      padding: 14px 18px;
      border-radius: 18px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      font-size: 16px;
      font-weight: 700;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button-primary {
      background: linear-gradient(180deg, #9a673e 0%, #7f4d2a 100%);
      color: #fff;
      box-shadow: 0 12px 24px rgba(127, 77, 42, 0.22);
    }

    .button-secondary {
      background: rgba(255, 241, 211, 0.92);
      color: var(--primary-dark);
      border: 1px solid rgba(139, 91, 52, 0.22);
    }

    .meta {
      margin-top: 22px;
      padding-top: 16px;
      border-top: 1px dashed var(--line);
      font-size: 13px;
      color: var(--muted);
      word-break: break-word;
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">CafePlus Payment</p>
    <h1>Dang quay lai ung dung</h1>
    <p>Neu trinh duyet khong tu mo app, ban co the bam nut ben duoi de quay lai CafePlus va hoan tat buoc xac nhan thanh toan.</p>

    <div id="status" class="status">Dang chuan bi ket noi lai voi ung dung...</div>

    <div class="actions">
      <a id="open-app-button" class="button button-primary" href="#">Mo lai CafePlus</a>
      <a class="button button-secondary" href="./menu.html?v=web-vnpay-return">Quay ve trang menu</a>
    </div>

    <div id="query-preview" class="meta"></div>
  </main>

  <script>
    (function setupVnpayReturnBridge() {
      const params = new URLSearchParams(window.location.search);
      const query = params.toString();
      const deepLink = query ? `cfplus://vnpay-return?${query}` : "cfplus://vnpay-return";

      const statusEl = document.getElementById("status");
      const queryEl = document.getElementById("query-preview");
      const openButton = document.getElementById("open-app-button");

      openButton.href = deepLink;
      queryEl.textContent = query
        ? `Query tra ve: ${query}`
        : "Khong co tham so tra ve tu VNPAY.";

      let hasNavigated = false;
      const openApp = function () {
        if (hasNavigated) {
          return;
        }
        hasNavigated = true;
        statusEl.textContent = "Dang mo lai CafePlus...";
        window.location.href = deepLink;
      };

      openButton.addEventListener("click", function () {
        statusEl.textContent = "Dang mo lai CafePlus...";
      });

      window.setTimeout(openApp, 500);
    })();
  </script>
</body>
</html>
