<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CafePlus | Gọi món tại bàn</title>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="./styles.css?v=web-20260415a">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-block">
        <div class="brand-mark">CF</div>
        <div>
          <p class="brand-kicker">CafePlus Table Order - Web</p>
          <h1>Gọi món tại bàn</h1>
        </div>
      </div>

      <div class="topbar-meta">
        <div class="meta-chip">
          <span class="meta-label">Bàn hiện tại</span>
          <strong id="tableDisplay">Đang tải...</strong>
        </div>
        <div class="meta-chip status">
          <span class="meta-label">Kết nối</span>
          <strong id="authStatus">Đang kết nối...</strong>
        </div>
      </div>
    </header>

    <main class="workspace">
      <aside class="category-rail panel">
        <div class="rail-head">
          <p class="section-kicker">Danh mục</p>
          <h2>Thực đơn</h2>
        </div>
        <div id="categoryList" class="category-list"></div>
      </aside>

      <section class="menu-stage panel">
        <div class="stage-head">
          <div>
            <p class="section-kicker">Menu tại bàn</p>
            <h2 id="menuHeading">Tất cả món</h2>
          </div>

          <div class="stage-actions">
            <label class="search-field">
              <input id="searchInput" type="search" placeholder="Tìm món, ví dụ: cà phê sữa đá">
            </label>
          </div>
        </div>

        <div id="menuGrid" class="menu-grid"></div>
        <div id="menuEmpty" class="menu-empty hidden">Không có món phù hợp với bộ lọc hiện tại.</div>
      </section>

      <aside id="cartPanel" class="cart-panel panel">
        <div class="cart-head">
          <div>
            <p class="section-kicker">Giỏ hàng</p>
            <h2>Đơn đang chọn</h2>
          </div>
          <div class="cart-head-actions">
            <span id="cartCount" class="cart-count">0 món</span>
            <button id="closeCartBtn" class="close-cart-btn" type="button" aria-label="Đóng giỏ hàng">×</button>
          </div>
        </div>

        <div id="emptyState" class="cart-empty">Chưa có món nào trong đơn. Hãy chọn món từ thực đơn.</div>
        <div id="cartList" class="cart-list"></div>

        <label class="note-field">
          <span>Ghi chú chung</span>
          <textarea id="commonNote" rows="3" placeholder="Ví dụ: lên món theo đợt, ít đá, cần thêm ly..."></textarea>
        </label>

        <div class="totals-card">
          <div class="total-row">
            <span>Tạm tính</span>
            <strong id="subtotalValue">0đ</strong>
          </div>
          <div class="total-row total-row-main">
            <span>Tổng cộng</span>
            <strong id="grandTotalValue">0đ</strong>
          </div>
        </div>

        <button id="submitOrderBtn" class="primary-btn" type="button">Đặt món</button>
        <p id="messageBox" class="message"></p>
      </aside>
    </main>
  </div>

  <button id="mobileCartBar" class="mobile-cart-bar hidden" type="button">
    <span class="mobile-cart-label">Xem giỏ hàng</span>
    <strong id="mobileCartSummary">0 món - 0đ</strong>
  </button>

  <div id="mobileCartBackdrop" class="mobile-cart-backdrop hidden"></div>

  <script type="module" src="./app.js?v=web-20260415a"></script>
</body>
</html>
